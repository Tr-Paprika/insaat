<!DOCTYPE html>
<html lang="tr" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Şantiye Pro Final</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script defer src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <style>
    :root,
    [data-theme="light"] {
      --bg: #f5f7fb;
      --surface: #ffffff;
      --surface-2: #eef3f9;
      --surface-3: #e6edf5;
      --border: rgba(15, 23, 42, 0.10);
      --text: #0f172a;
      --muted: #64748b;
      --faint: #94a3b8;
      --primary: #0f766e;
      --primary-hover: #115e59;
      --success: #15803d;
      --warning: #b45309;
      --danger: #b91c1c;
      --info: #1d4ed8;
      --shadow-sm: 0 1px 2px rgba(15, 23, 42, .05);
      --shadow-md: 0 12px 30px rgba(15, 23, 42, .08);
      --radius-sm: 10px;
      --radius-md: 16px;
      --radius-lg: 22px;
      --space-1: 4px;
      --space-2: 8px;
      --space-3: 12px;
      --space-4: 16px;
      --space-5: 20px;
      --space-6: 24px;
      --space-8: 32px;
      --space-10: 40px;
      --sidebar-w: 280px;
      --topbar-h: 84px;
    }

    [data-theme="dark"] {
      --bg: #09111f;
      --surface: #121c2f;
      --surface-2: #182438;
      --surface-3: #223149;
      --border: rgba(255, 255, 255, 0.08);
      --text: #e5edf7;
      --muted: #9fb0c5;
      --faint: #718198;
      --primary: #22c55e;
      --primary-hover: #16a34a;
      --success: #4ade80;
      --warning: #f59e0b;
      --danger: #f87171;
      --info: #60a5fa;
      --shadow-sm: 0 1px 2px rgba(0,0,0,.25);
      --shadow-md: 0 12px 32px rgba(0,0,0,.35);
    }

    * { box-sizing: border-box; }
    html {
      font-family: Inter, system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      color-scheme: light dark;
      scroll-behavior: smooth;
    }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 16px;
      line-height: 1.5;
    }
    button, input, select, textarea { font: inherit; color: inherit; }
    button { cursor: pointer; }
    img { display: block; max-width: 100%; }
    .skip-link {
      position: absolute;
      left: -9999px;
      top: 12px;
      z-index: 9999;
      background: var(--surface);
      color: var(--text);
      padding: 10px 14px;
      border-radius: 12px;
      border: 1px solid var(--border);
    }
    .skip-link:focus { left: 12px; }
    :focus-visible {
      outline: 3px solid color-mix(in srgb, var(--primary) 35%, transparent);
      outline-offset: 2px;
    }

    .app {
      display: grid;
      grid-template-columns: var(--sidebar-w) minmax(0, 1fr);
      min-height: 100vh;
    }

    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      background: linear-gradient(180deg, color-mix(in srgb, var(--surface) 85%, #0f172a 15%), var(--surface));
      border-right: 1px solid var(--border);
      padding: var(--space-5);
      display: flex;
      flex-direction: column;
      gap: var(--space-5);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      padding-bottom: var(--space-4);
      border-bottom: 1px solid var(--border);
    }

    .brand__logo {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, var(--primary), color-mix(in srgb, var(--primary) 70%, #0f172a 30%));
      color: white;
      font-weight: 800;
      box-shadow: var(--shadow-md);
    }

    .brand small { display: block; color: var(--muted); }

    .nav {
      display: grid;
      gap: 8px;
      overflow: auto;
    }

    .nav__item,
    .mobile-nav__item {
      min-height: 46px;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid transparent;
      background: transparent;
      color: var(--text);
      text-align: left;
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 600;
    }

    .nav__item:hover,
    .mobile-nav__item:hover,
    .nav__item.is-active,
    .mobile-nav__item.is-active {
      background: var(--surface-2);
      border-color: var(--border);
    }

    .shell { min-width: 0; }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 30;
      min-height: var(--topbar-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      background: color-mix(in srgb, var(--surface) 88%, transparent);
      backdrop-filter: blur(12px);
    }

    .topbar h1 {
      margin: 0 0 4px;
      font-size: clamp(1.4rem, 1.1rem + 1vw, 2rem);
      line-height: 1.1;
    }

    .topbar p {
      margin: 0;
      color: var(--muted);
      max-width: 60ch;
    }

    .topbar__actions { display: flex; align-items: center; gap: 10px; }

    .main { padding: 24px; }
    .view { display: none; }
    .view.is-active { display: block; }

    .stats-grid,
    .content-grid,
    .list-grid,
    .photo-grid,
    .kanban {
      display: grid;
      gap: 16px;
    }

    .stats-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); margin-bottom: 16px; }
    .content-grid { grid-template-columns: 1.2fr .8fr; }
    .list-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .photo-grid { grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); }
    .kanban { grid-template-columns: repeat(3, minmax(0, 1fr)); }

    .card,
    .stat-card,
    .project-card,
    .report-card,
    .task-card,
    .inventory-card,
    .photo-card,
    .notice-card,
    .table-card,
    .kanban__column {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-sm);
    }

    .card,
    .table-card,
    .kanban__column,
    .project-card,
    .report-card,
    .task-card,
    .inventory-card,
    .notice-card,
    .photo-card { padding: 18px; }

    .stat-card {
      padding: 18px;
      display: grid;
      gap: 8px;
    }
    .stat-card__value { font-size: 1.8rem; font-weight: 800; }
    .stat-card__label { color: var(--muted); }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
    }

    .btn {
      min-height: 44px;
      border-radius: 12px;
      padding: 10px 16px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-weight: 600;
    }
    .btn:hover { background: var(--surface-2); }
    .btn--primary {
      background: var(--primary);
      color: #fff;
      border-color: transparent;
    }
    .btn--primary:hover { background: var(--primary-hover); }
    .btn--ghost { background: transparent; }
    .btn--danger {
      background: color-mix(in srgb, var(--danger) 12%, var(--surface));
      color: var(--danger);
    }

    .form-grid { display: grid; gap: 14px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .form-group { display: grid; gap: 8px; }
    .form-group label { font-size: .92rem; font-weight: 600; }
    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%;
      min-height: 44px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      padding: 12px 14px;
    }
    .form-group textarea { min-height: 110px; resize: vertical; }
    .field-error { color: var(--danger); font-size: .86rem; }

    .status {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: .84rem;
      font-weight: 700;
    }
    .status--success { background: color-mix(in srgb, var(--success) 14%, transparent); color: var(--success); }
    .status--warning { background: color-mix(in srgb, var(--warning) 14%, transparent); color: var(--warning); }
    .status--danger { background: color-mix(in srgb, var(--danger) 14%, transparent); color: var(--danger); }
    .status--info { background: color-mix(in srgb, var(--info) 14%, transparent); color: var(--info); }

    .meta { color: var(--muted); font-size: .92rem; }
    .stack { display: grid; gap: 12px; }
    .row-between { display: flex; justify-content: space-between; gap: 12px; align-items: start; }
    .muted { color: var(--muted); }
    .empty-state {
      text-align: center;
      padding: 32px 18px;
      color: var(--muted);
      background: var(--surface);
      border: 1px dashed var(--border);
      border-radius: var(--radius-md);
    }

    .table {
      width: 100%;
      border-collapse: collapse;
    }
    .table th,
    .table td {
      padding: 12px;
      border-bottom: 1px solid var(--border);
      text-align: left;
      vertical-align: top;
    }
    .table th { color: var(--muted); font-size: .9rem; }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(2, 6, 23, .58);
      display: grid;
      place-items: center;
      padding: 16px;
      z-index: 999;
    }
    .modal {
      width: min(760px, 100%);
      max-height: 92vh;
      overflow: auto;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: var(--shadow-md);
    }
    .modal__header,
    .modal__body,
    .modal__footer {
      padding: 18px;
    }
    .modal__header,
    .modal__footer { border-bottom: 1px solid var(--border); }
    .modal__footer {
      border-bottom: 0;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      position: sticky;
      bottom: 0;
      background: var(--surface);
    }

    .toast-stack {
      position: fixed;
      right: 16px;
      bottom: 16px;
      display: grid;
      gap: 8px;
      z-index: 1200;
    }
    .toast {
      min-width: 260px;
      max-width: 360px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 12px 14px;
      border-radius: 14px;
      box-shadow: var(--shadow-md);
    }

    .mobile-nav { display: none; }

    .photo-card img {
      width: 100%;
      aspect-ratio: 16 / 10;
      object-fit: cover;
      border-radius: 12px;
      margin-bottom: 10px;
      background: var(--surface-2);
    }

    .priority-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      display: inline-block;
      margin-right: 8px;
      transform: translateY(1px);
    }

    @media (max-width: 1180px) {
      .stats-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .list-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .content-grid { grid-template-columns: 1fr; }
      .kanban { grid-template-columns: 1fr; }
    }

    @media (max-width: 820px) {
      .app { grid-template-columns: 1fr; }
      .sidebar { display: none; }
      .main, .topbar { padding: 16px; }
      .stats-grid, .list-grid, .form-row { grid-template-columns: 1fr; }
      .mobile-nav {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 8px;
        position: sticky;
        bottom: 0;
        padding: 10px;
        border-top: 1px solid var(--border);
        background: var(--surface);
        z-index: 50;
      }
      body { padding-bottom: 78px; }
      .topbar { align-items: start; flex-direction: column; }
      .topbar__actions { width: 100%; justify-content: space-between; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>
<body>
  <a href="#main" class="skip-link">İçeriğe geç</a>

  <div class="app">
    <aside class="sidebar" aria-label="Ana navigasyon">
      <div class="brand">
        <div class="brand__logo" aria-hidden="true">ŞP</div>
        <div>
          <strong>Şantiye Pro</strong>
          <small>Final Sürüm</small>
        </div>
      </div>

      <nav class="nav" id="sidebarNav">
        <button class="nav__item is-active" data-route="dashboard">Dashboard</button>
        <button class="nav__item" data-route="dailyReports">Günlük Rapor</button>
        <button class="nav__item" data-route="tasks">Görev Yönetimi</button>
        <button class="nav__item" data-route="personnel">Personel</button>
        <button class="nav__item" data-route="inventory">Stok</button>
        <button class="nav__item" data-route="photos">Fotoğraflar</button>
        <button class="nav__item" data-route="notifications">Bildirimler</button>
        <button class="nav__item" data-route="projects">Şantiyeler</button>
      </nav>
    </aside>

    <div class="shell">
      <header class="topbar">
        <div>
          <h1 id="pageTitle">Dashboard</h1>
          <p id="pageSubtitle">Saha operasyonlarını modern, güvenli ve mobil uyumlu panelden yönetin.</p>
        </div>
        <div class="topbar__actions">
          <button class="btn btn--ghost" id="themeToggle" aria-label="Tema değiştir">🌙</button>
          <button class="btn btn--primary" data-action="open-modal" data-modal="quickAddModal">+ Hızlı Ekle</button>
        </div>
      </header>

      <main class="main" id="main">
        <section class="view is-active" data-view="dashboard">
          <div id="statsGrid" class="stats-grid"></div>
          <div class="content-grid">
            <section class="card stack" id="todayOverview"></section>
            <section class="card stack" id="recentActivities"></section>
          </div>
        </section>

        <section class="view" data-view="dailyReports">
          <div class="section-head">
            <h2>Günlük Raporlar</h2>
            <button class="btn btn--primary" data-action="open-modal" data-modal="reportModal">Rapor Ekle</button>
          </div>
          <div id="dailyReportsList" class="list-grid"></div>
        </section>

        <section class="view" data-view="tasks">
          <div class="section-head">
            <h2>Görev Yönetimi</h2>
            <button class="btn btn--primary" data-action="open-modal" data-modal="taskModal">Görev Ekle</button>
          </div>
          <div id="taskBoard" class="kanban"></div>
        </section>

        <section class="view" data-view="personnel">
          <div class="section-head">
            <h2>Personel Takibi</h2>
            <button class="btn btn--primary" data-action="open-modal" data-modal="personModal">Personel Ekle</button>
          </div>
          <div id="personnelList" class="table-card"></div>
        </section>

        <section class="view" data-view="inventory">
          <div class="section-head">
            <h2>Malzeme / Stok</h2>
            <button class="btn btn--primary" data-action="open-modal" data-modal="stockModal">Stok Hareketi</button>
          </div>
          <div id="inventoryList" class="list-grid"></div>
        </section>

        <section class="view" data-view="photos">
          <div class="section-head">
            <h2>Fotoğraf Arşivi</h2>
            <button class="btn btn--primary" data-action="open-modal" data-modal="photoModal">Fotoğraf Ekle</button>
          </div>
          <div id="photoGallery" class="photo-grid"></div>
        </section>

        <section class="view" data-view="notifications">
          <div class="section-head">
            <h2>Bildirim Merkezi</h2>
          </div>
          <div id="notificationList" class="list-grid"></div>
        </section>

        <section class="view" data-view="projects">
          <div class="section-head">
            <h2>Şantiyeler</h2>
            <button class="btn btn--primary" data-action="open-modal" data-modal="projectModal">Şantiye Ekle</button>
          </div>
          <div id="projectGrid" class="list-grid"></div>
        </section>
      </main>
    </div>
  </div>

  <nav class="mobile-nav" aria-label="Mobil navigasyon">
    <button class="mobile-nav__item is-active" data-route="dashboard">Ana</button>
    <button class="mobile-nav__item" data-route="tasks">Görev</button>
    <button class="mobile-nav__item" data-route="personnel">Ekip</button>
    <button class="mobile-nav__item" data-route="inventory">Stok</button>
    <button class="mobile-nav__item" data-route="projects">Şantiye</button>
  </nav>

  <div id="modalRoot" class="modal-backdrop" hidden></div>
  <div id="toastStack" class="toast-stack" aria-live="polite" aria-atomic="true"></div>

  <script>
    (() => {
      const firebaseConfig = {
        apiKey: "BURAYA_MEVCUT_FIREBASE_CONFIGINI_YAPISTIR",
        authDomain: "BURAYA_MEVCUT_FIREBASE_CONFIGINI_YAPISTIR",
        projectId: "BURAYA_MEVCUT_FIREBASE_CONFIGINI_YAPISTIR",
        storageBucket: "BURAYA_MEVCUT_FIREBASE_CONFIGINI_YAPISTIR",
        messagingSenderId: "BURAYA_MEVCUT_FIREBASE_CONFIGINI_YAPISTIR",
        appId: "BURAYA_MEVCUT_FIREBASE_CONFIGINI_YAPISTIR"
      };

      const state = {
        route: 'dashboard',
        theme: matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light',
        ui: { modal: null, saving: false },
        data: {
          projects: [],
          dailyReports: [],
          tasks: [],
          personnel: [],
          inventory: [],
          photos: [],
          notifications: []
        }
      };

      let db = null;
      let docRef = null;

      const $ = (sel, root = document) => root.querySelector(sel);
      const $$ = (sel, root = document) => [...root.querySelectorAll(sel)];

      const routes = {
        dashboard: ['Dashboard', 'Saha operasyonlarını modern, güvenli ve mobil uyumlu panelden yönetin.'],
        dailyReports: ['Günlük Rapor', 'İlerleme, risk ve saha notlarını kaydedin.'],
        tasks: ['Görev Yönetimi', 'Bekleyen, devam eden ve tamamlanan işleri izleyin.'],
        personnel: ['Personel Takibi', 'Ekip, rol ve saha dağılımını yönetin.'],
        inventory: ['Stok Sistemi', 'Malzeme giriş-çıkış ve kritik stokları takip edin.'],
        photos: ['Fotoğraf Arşivi', 'Sahadan görsel kayıt toplayın.'],
        notifications: ['Bildirim Merkezi', 'Önemli olayları ve aksiyonları kaçırmayın.'],
        projects: ['Şantiyeler', 'Aktif ve planlanan şantiye kayıtlarını yönetin.']
      };

      function initFirebase() {
        if (!window.firebase) return;
        if (!firebase.apps.length && firebaseConfig.projectId !== 'BURAYA_MEVCUT_FIREBASE_CONFIGINI_YAPISTIR') {
          firebase.initializeApp(firebaseConfig);
          db = firebase.firestore();
          docRef = db.collection('santiye_pro_final').doc('veri');
        }
      }

      function escapeHtml(value = '') {
        return String(value)
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#39;');
      }

      function sanitizeText(value, max = 250) {
        return String(value || '').replace(/\s+/g, ' ').trim().slice(0, max);
      }

      function sanitizeNumber(value, min = 0, max = 999999999, fallback = 0) {
        const n = Number(value);
        if (!Number.isFinite(n)) return fallback;
        return Math.max(min, Math.min(max, n));
      }

      function uid() {
        return crypto.randomUUID ? crypto.randomUUID() : `${Date.now()}-${Math.random().toString(16).slice(2)}`;
      }

      function today() {
        return new Date().toISOString().slice(0, 10);
      }

      function projectNameById(id) {
        return state.data.projects.find(p => p.id === id)?.name || 'Şantiye seçilmedi';
      }

      function projectOptions() {
        if (!state.data.projects.length) return '<option value="">Şantiye yok</option>';
        return state.data.projects.map(p => `<option value="${escapeHtml(p.id)}">${escapeHtml(p.name)}</option>`).join('');
      }

      function setTheme(theme) {
        state.theme = theme;
        document.documentElement.setAttribute('data-theme', theme);
        $('#themeToggle').textContent = theme === 'dark' ? '☀️' : '🌙';
      }

      function toast(message) {
        const el = document.createElement('div');
        el.className = 'toast';
        el.textContent = message;
        $('#toastStack').appendChild(el);
        setTimeout(() => el.remove(), 3200);
      }

      function setRoute(route) {
        state.route = route;
        $$('[data-route]').forEach(btn => btn.classList.toggle('is-active', btn.dataset.route === route));
        $$('.view').forEach(view => view.classList.toggle('is-active', view.dataset.view === route));
        $('#pageTitle').textContent = routes[route]?.[0] || 'Şantiye Pro';
        $('#pageSubtitle').textContent = routes[route]?.[1] || '';
        render();
      }

      function openModal(name) {
        state.ui.modal = name;
        const root = $('#modalRoot');
        root.hidden = false;
        root.innerHTML = modalMarkup(name);
        const firstEl = root.querySelector('input,select,textarea,button');
        if (firstEl) firstEl.focus();
      }

      function closeModal() {
        state.ui.modal = null;
        const root = $('#modalRoot');
        root.hidden = true;
        root.innerHTML = '';
      }

      function modalMarkup(name) {
        const modals = {
          quickAddModal: {
            title: 'Hızlı Ekle',
            body: `
              <div class="form-grid">
                <button class="btn btn--primary" data-action="open-modal" data-modal="projectModal" type="button">Yeni Şantiye</button>
                <button class="btn btn--primary" data-action="open-modal" data-modal="taskModal" type="button">Yeni Görev</button>
                <button class="btn btn--primary" data-action="open-modal" data-modal="reportModal" type="button">Günlük Rapor</button>

      function getStats() {
        const openTasks = state.data.tasks.filter(t => t.status !== 'done').length;
        const staffToday = state.data.dailyReports
          .filter(r => r.date === today())
          .reduce((sum, item) => sum + (Number(item.staffCount) || 0), 0);
        const criticalStock = state.data.inventory.filter(i => i.threshold > 0 && i.type === 'out' && i.quantity >= i.threshold).length;
        const unread = state.data.notifications.filter(n => !n.read).length;

        return [
          { label: 'Toplam Şantiye', value: state.data.projects.length },
          { label: 'Açık Görev', value: openTasks },
          { label: 'Bugün Saha', value: staffToday },
          { label: 'Bildirim', value: unread + criticalStock }
        ];
      }

        state.data.notifications.unshift({ id: uid(), title, message, read: false, createdAt: new Date().toISOString() });

      function validateProject(raw) {
        const name = sanitizeText(raw.name, 120);
        const startDate = raw.startDate || '';
        const endDate = raw.endDate || '';
        if (!name) throw new Error('Şantiye adı zorunludur.');
        if (startDate && endDate && startDate > endDate) throw new Error('Bitiş tarihi başlangıç tarihinden önce olamaz.');
        return {
          id: uid(),
          name,
          location: sanitizeText(raw.location, 120),
          startDate,
          endDate,
          description: sanitizeText(raw.description, 500),
          createdAt: new Date().toISOString()
        };
      }

      function validateTask(raw) {
        const title = sanitizeText(raw.title, 120);
        if (!title) throw new Error('Görev başlığı zorunludur.');
        return {
          id: uid(),
          title,
          projectId: sanitizeText(raw.projectId, 80),
          priority: ['high','medium','low'].includes(raw.priority) ? raw.priority : 'medium',
          dueDate: raw.dueDate || '',
          assignee: sanitizeText(raw.assignee, 80),
          description: sanitizeText(raw.description, 500),
          status: 'todo',
          createdAt: new Date().toISOString()
        };
      }

      function validateReport(raw) {
        const summary = sanitizeText(raw.summary, 700);
        if (!summary) throw new Error('Gün özeti zorunludur.');
        return {
          id: uid(),
          projectId: sanitizeText(raw.projectId, 80),
          date: raw.date || today(),
          summary,
          issues: sanitizeText(raw.issues, 500),
          staffCount: sanitizeNumber(raw.staffCount, 0, 100000, 0),
          createdAt: new Date().toISOString()
        };
      }

      function validatePerson(raw) {
        const name = sanitizeText(raw.name, 120);
        const role = sanitizeText(raw.role, 80);
        if (!name || !role) throw new Error('Ad soyad ve görev zorunludur.');
        return {
          id: uid(),
          name,
          role,
          projectId: sanitizeText(raw.projectId, 80),
          phone: sanitizeText(raw.phone, 20),
          createdAt: new Date().toISOString()
        };
      }

      function validateStock(raw) {
        const name = sanitizeText(raw.name, 120);
        if (!name) throw new Error('Malzeme adı zorunludur.');
        return {
          id: uid(),
          name,
          type: raw.type === 'out' ? 'out' : 'in',
          quantity: sanitizeNumber(raw.quantity, 0, 100000000, 0),
          unit: sanitizeText(raw.unit, 20),
          threshold: sanitizeNumber(raw.threshold, 0, 100000000, 0),
          projectId: sanitizeText(raw.projectId, 80),
          createdAt: new Date().toISOString()
        };
      }

      function validatePhoto(raw) {
        const title = sanitizeText(raw.title, 120);
        const url = sanitizeText(raw.url, 500);
        if (!title) throw new Error('Fotoğraf başlığı zorunludur.');
        if (!/^https?:\/\//i.test(url)) throw new Error('Geçerli bir URL girin.');
        return {
          id: uid(),
          title,
          url,
          projectId: sanitizeText(raw.projectId, 80),
          createdAt: new Date().toISOString()
        };
      }

      async function persist() {
        if (!docRef) return;
        state.ui.saving = true;
        try {
          await docRef.set(state.data);
        } catch (err) {
          console.error(err);
          toast('Bulut kaydı başarısız oldu.');
        } finally {
          state.ui.saving = false;
        }
      }

      async function hydrate() {
        if (!docRef) {
          seedDemoData();
          return;
        }
        try {
          const snap = await docRef.get();
          if (snap.exists) {
            const data = snap.data() || {};
            state.data.projects = Array.isArray(data.projects) ? data.projects : [];
            state.data.dailyReports = Array.isArray(data.dailyReports) ? data.dailyReports : [];
            state.data.tasks = Array.isArray(data.tasks) ? data.tasks : [];
            state.data.personnel = Array.isArray(data.personnel) ? data.personnel : [];
            state.data.inventory = Array.isArray(data.inventory) ? data.inventory : [];
            state.data.photos = Array.isArray(data.photos) ? data.photos : [];
            state.data.notifications = Array.isArray(data.notifications) ? data.notifications : [];
          } else {
            seedDemoData();
          }
        } catch (err) {
          console.error(err);
          seedDemoData();
          toast('Demo verilerle devam ediliyor.');
        }
      }

          { id: uid(), name: 'Ahmet Kaya', role: 'Kalıp Ustası', projectId: p1, phone: '0555 000 00 01' },
          { id: uid(), name: 'Murat Demir', role: 'Elektrik Ustası', projectId: p1, phone: '0555 000 00 02' },
          { id: uid(), name: 'Emre Şahin', role: 'Depo Sorumlusu', projectId: p2, phone: '0555 000 00 03' }
        ];
        state.data.inventory = [
          { id: uid(), name: 'C25 Hazır Beton', type: 'in', quantity: 120, unit: 'm3', threshold: 0, projectId: p1 },
          { id: uid(), name: '8 mm Nervürlü Demir', type: 'out', quantity: 18, unit: 'ton', threshold: 15, projectId: p1 },
          { id: uid(), name: 'Cephe Dübeli', type: 'out', quantity: 2200, unit: 'adet', threshold: 2000, projectId: p2 }
        ];
        state.data.photos = [
          { id: uid(), title: 'Kalıp hazırlığı', url: 'https://picsum.photos/seed/santiye1/900/560', projectId: p1 },
          { id: uid(), title: 'Cephe söküm alanı', url: 'https://picsum.photos/seed/santiye2/900/560', projectId: p2 }
        ];
        state.data.notifications = [
          { id: uid(), title: 'Kritik stok uyarısı', message: 'Cephe dübeli kritik eşiğe yaklaştı.', read: false },
          { id: uid(), title: 'Bugün 2 rapor girildi', message: 'Saha ekiplerinden yeni günlük raporlar geldi.', read: false }
        ];
      }

      async function handleFormSubmit(form) {
        const raw = collectFormData(form);
        const type = form.dataset.form;

        if (type === 'project') {
          const item = validateProject(raw);
          state.data.projects.unshift(item);
          addNotification('Yeni şantiye eklendi', `${item.name} kaydı oluşturuldu.`);
        }

        if (type === 'task') {
          const item = validateTask(raw);
          state.data.tasks.unshift(item);
          addNotification('Yeni görev oluşturuldu', `${item.title} görevi eklendi.`);
        }

        if (type === 'report') {
          const item = validateReport(raw);
          state.data.dailyReports.unshift(item);
          addNotification('Yeni günlük rapor', `${projectNameById(item.projectId)} için rapor eklendi.`);
        }

        if (type === 'person') {
          const item = validatePerson(raw);
          state.data.personnel.unshift(item);
          addNotification('Yeni personel eklendi', `${item.name} sisteme kaydedildi.`);
        }

        if (type === 'stock') {
          const item = validateStock(raw);
          state.data.inventory.unshift(item);
          addNotification('Yeni stok hareketi', `${item.name} için ${item.type === 'out' ? 'çıkış' : 'giriş'} işlendi.`);
          if (item.threshold > 0 && item.type === 'out' && item.quantity >= item.threshold) {
            addNotification('Kritik stok alarmı', `${item.name} kritik eşik seviyesine ulaştı.`);
          }
        }

        if (type === 'photo') {
          const item = validatePhoto(raw);
          state.data.photos.unshift(item);
          addNotification('Yeni fotoğraf eklendi', `${item.title} arşive eklendi.`);
        }

        await persist();
        closeModal();
        render();
        toast('Kayıt başarıyla tamamlandı.');
      }

      function cycleTask(taskId) {
        const task = state.data.tasks.find(t => t.id === taskId);
        if (!task) return;
        task.status = task.status === 'todo' ? 'inProgress' : task.status === 'inProgress' ? 'done' : 'todo';
        persist();
        render();
      }

      function deleteProject(projectId) {
        const project = state.data.projects.find(p => p.id === projectId);
        if (!project) return;
        const ok = confirm(`${project.name} silinsin mi? Bağlı kayıtlar korunur, ancak şantiye alanı boş kalabilir.`);
        if (!ok) return;
        state.data.projects = state.data.projects.filter(p => p.id !== projectId);
        addNotification('Şantiye silindi', `${project.name} kaydı kaldırıldı.`);
        persist();
        render();
      }

      function bindEvents() {
        document.addEventListener('click', event => {
          const routeEl = event.target.closest('[data-route]');
          if (routeEl) {
            setRoute(routeEl.dataset.route);
            return;
          }

          const actionEl = event.target.closest('[data-action]');
          if (!actionEl) return;
          const { action } = actionEl.dataset;

          if (action === 'open-modal') {
            openModal(actionEl.dataset.modal);
            return;
          }
          if (action === 'close-modal') {
            closeModal();
            return;
          }
          if (action === 'cycle-task') {
            cycleTask(actionEl.dataset.id);
            return;
          }
          if (action === 'delete-project') {
            deleteProject(actionEl.dataset.id);
            return;
          }
        });

        document.addEventListener('submit', async event => {
          const form = event.target.closest('form[data-form]');
          if (!form) return;
          event.preventDefault();
          try {
            await handleFormSubmit(form);
          } catch (err) {
            toast(err.message || 'Form doğrulama hatası.');
          }
        });

        $('#themeToggle').addEventListener('click', () => {
          setTheme(state.theme === 'dark' ? 'light' : 'dark');
        });

        $('#modalRoot').addEventListener('click', event => {
          if (event.target.id === 'modalRoot') closeModal();
        });

        document.addEventListener('keydown', event => {
          if (event.key === 'Escape' && state.ui.modal) closeModal();
        });
      }

      async function bootstrap() {
        setTheme(state.theme);
        initFirebase();
        await hydrate();
        bindEvents();
        setRoute('dashboard');
      }

      bootstrap();
    })();
  </script>
</body>
</html>
